<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EmpirePicks – Dashboard</title>

  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="brand">
      <div class="brand-mark">EP</div>
      <span class="brand-name">EmpirePicks</span>
    </div>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="#" class="active">NFL</a>
      <button id="logout-btn" class="button secondary">Log Out</button>
    </nav>
  </header>

  <!-- GAME FEED -->
  <section class="game-feed" id="events-container">
    <div class="loader">Loading NFL games...</div>
  </section>

  <!-- FLOATING PARLAY SLIP -->
  <div class="parlay-slip" id="parlay-slip">
    <h4>Your Parlay</h4>
    <div id="parlay-items" class="muted">No picks added</div>
    <br/>
    <button class="button primary full-width" id="place-parlay">Place Parlay</button>
  </div>

  <!-- JS MODULES -->
  <script src="helpers.js"></script>
  <script src="state.js"></script>
  <script src="ui.js"></script>
  <script src="teams.js"></script>

  <script src="card.js"></script>
  <script src="linesPanel.js"></script>
  <script src="propsPanel.js"></script>
  <script src="parlay.js"></script>

  <script src="dashboard.js"></script>
</body>
</html>
