<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EmpirePicks – Dashboard</title>

  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>

  <!-- AUTH GUARD -->
  <script type="module">
    import { validateToken } from "./token.js";
    if (!validateToken()) window.location.href = "/login.html";
  </script>
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="brand">
      <div class="brand-mark">EP</div>
      <span class="brand-name">EmpirePicks</span>
    </div>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="#" class="active">NFL</a>
      <button id="logout-btn" class="button secondary">Log Out</button>
    </nav>
  </header>

  <!-- GAME FEED -->
  <section class="game-feed" id="events-container">
    <div class="loader">Loading NFL games...</div>
  </section>

  <!-- FLOATING PARLAY SLIP -->
  <div class="parlay-slip" id="parlay-slip">
    <h4>Your Parlay</h4>
    <div id="parlay-items" class="muted">No picks added</div>
    <br/>
    <button class="button primary full-width" id="place-parlay">Place Parlay</button>
  </div>

  <!-- SCRIPT ORDER MATTERS -->
  <!-- Everything below MUST be modules to use import/export logic -->
  <script type="module" src="teams.js"></script>
  <script type="module" src="parlay.js"></script>
  <script type="module" src="script.js"></script>  <!-- games engine -->
  <script type="module" src="dashboard.js"></script>
</body>
</html>
