<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EmpirePicks – Dashboard</title>

  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="brand">
      <div class="brand-mark">EP</div>
      <span class="brand-name">EmpirePicks</span>
    </div>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="dashboard.html" class="active">NFL Dashboard</a>
    </nav>
  </header>

  <!-- GAME FEED -->
  <section class="game-feed" id="events-container">
    <div class="loader">Loading NFL games...</div>
  </section>

  <!-- FLOATING PARLAY SLIP -->
  <div class="parlay-slip" id="parlay-slip">
    <h4>Your Parlay</h4>
    <div id="parlay-items" class="muted">No picks added</div>
    <br/>
    <button class="button primary full-width" id="place-parlay">Place Parlay</button>
  </div>

  <!-- DASHBOARD ANALYTICS PANEL -->
  <section class="dashboard-section">
    <h2>Weekly EV Edges</h2>
    <button id="refresh" class="button secondary">Refresh</button>

    <div id="top5" class="top5-panel"></div>

    <table id="dash" class="table">
      <thead>
        <tr>
          <th>Game</th>
          <th>Book</th>
          <th>Market</th>
          <th>Odds</th>
          <th>Edge</th>
          <th>Kickoff</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- PARLAY ENGINE OUTPUT -->
  <section class="dashboard-section">
    <h2>Parlay EV Optimizer</h2>

    <label>Minimum Edge:
      <input id="parlayEdgeFilter" type="number" min="0" max="1" step="0.01" value="0.02"/>
    </label>

    <button id="generateParlays" class="button primary">Generate Parlays</button>

    <div id="parlayResults" class="parlay-results"></div>
  </section>

  <!-- GLOBAL JS FILES -->
  <!-- Order is CRITICAL. TeamAssets FIRST, then parlay, then script, then dashboard -->
  <script src="teams.js"></script>
  <script src="parlay.js"></script>
  <script src="script.js"></script>
  <script src="dashboard.js"></script>

</body>
</html>
