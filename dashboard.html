<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EmpirePicks – Dashboard</title>

  <link rel="stylesheet" href="styles.css?v=dk1"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>

<body>

  <header class="header">
    EmpirePicks ▸ Analytics Dashboard
  </header>

  <main class="dashboard-root">

    <section class="dashboard-section">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2>Top Edges</h2>
        <button id="refresh" class="button">Refresh</button>
      </div>

      <div id="top5" class="top5-panel muted">Loading…</div>

      <table id="dash-table" class="table">
        <thead>
          <tr>
            <th>Game</th>
            <th>Book</th>
            <th>Market</th>
            <th>Odds</th>
            <th>Edge</th>
            <th>Kickoff</th>
          </tr>
        </thead>
        <tbody id="dash-body">
          <tr><td colspan="6" class="muted">Loading…</td></tr>
        </tbody>
      </table>
    </section>

    <section class="dashboard-section">
      <h2>Parlay EV Builder</h2>

      <label>
        Minimum Edge:
        <input id="parlayEdgeFilter" type="number" value="0.02" step="0.01" min="0" max="1"/>
      </label>
      <button id="generateParlays" class="button">Generate</button>

      <div id="parlayResults" class="parlay-results"></div>
    </section>
  </main>

  <!-- FLOATING PARLAY SLIP -->
  <aside class="dk-parlay-slip" id="parlay-slip">
    <h3>Your Parlay</h3>
    <div id="parlay-items" class="muted">No picks added</div>
    <button id="place-parlay" class="button">Place Parlay</button>
  </aside>

  <footer class="footer">
    EmpirePicks • Market Edges Powered by Odds API
  </footer>

  <script src="teams.js"></script>
  <script src="parlay.js"></script>
  <script src="script.js"></script>
  <script src="dashboard.js"></script>

</body>
</html>
