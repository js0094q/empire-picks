<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>EmpirePicks • NFL Odds & Props</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css?v=20251213-final" />

  <!-- App Scripts -->
  <script type="module" src="teams.js"></script>
  <script type="module" src="script.js" defer></script>
</head>

<body>

  <!-- =====================================================
       HEADER (TOP BAR)
       ===================================================== -->
  <header class="ep-header">
    <div class="logo">🏛️ EmpirePicks</div>
    <button id="refresh-btn">Refresh Odds</button>
  </header>

  <!-- =====================================================
       MAIN APPLICATION LAYOUT
       ===================================================== -->
  <div class="layout">

    <!-- =========================
         LEFT RAIL (TOP PICKS)
         ========================= -->
    <aside class="left-rail">
      <section id="top-picks" class="top-picks">
        <h3>Top Picks (Model-Weighted)</h3>
        <!-- Injected by JS -->
      </section>
    </aside>

    <!-- =========================
         MAIN CONTENT
         ========================= -->
    <main class="main-content">

      <!-- HERO / BRANDING -->
      <section class="hero">
        <div class="hero-inner">
          <h1>EmpirePicks</h1>
          <p>
            Consensus odds, no-vig probabilities, and model-weighted value.
            Built from sharp and public books.
          </p>
        </div>
      </section>

      <!-- GAMES -->
      <div id="games-container" class="games-container">
        <div class="loading">Loading NFL games…</div>
      </div>

    </main>

  </div>

  <!-- =====================================================
       PARLAY MODAL (REQUIRED)
       ===================================================== -->
  <div id="parlay-backdrop" class="parlay-backdrop"></div>

  <div id="parlay-modal" class="parlay-modal">
    <button id="close-parlay" class="parlay-close">✕</button>

    <h3>Parlay</h3>

    <div id="parlay-legs" class="parlay-legs"></div>

    <label for="parlay-stake">Stake</label>
    <input id="parlay-stake" type="number" value="10" min="1" />

    <div id="parlay-summary" class="parlay-summary"></div>

    <button class="place-bet">Place Bet</button>
  </div>

  <!-- =====================================================
       FOOTER
       ===================================================== -->
  <footer class="ep-footer">
    Data from The Odds API • EmpirePicks.com
  </footer>

</body>
</html>
