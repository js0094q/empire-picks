<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EmpirePicks | NFL Odds & Props</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header-bar">
    <h1>🏈 EmpirePicks NFL</h1>
    <a href="dashboard.html">EV Dashboard →</a>
  </div>

  <div id="games"></div>

  <div class="parlay-pill" id="parlay-pill">
    Parlay: <span id="parlay-count">0</span> picks
  </div>

  <!-- Props/Mobile modal -->
  <div id="props-modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-props" class="close-btn">✕</button>
      <h2 id="modal-title">Player Props</h2>
      <input type="text" id="prop-search" placeholder="Search players…" class="prop-search" />
      <div id="props-container"></div>
    </div>
  </div>

  <script type="module" src="teams.js"></script>
  <script type="module" src="parlay.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
