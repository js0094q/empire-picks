<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EmpirePicks • NFL Odds & Props</title>

  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="script.js" defer></script>
</head>

<body>
  <header class="ep-header">
    <div class="logo">🏛️ EmpirePicks</div>
    <button id="refresh-btn">Refresh Odds</button>
  </header>

  <div class="layout">
    <aside class="left-rail">
      <section id="top-picks" class="top-picks"></section>
    </aside>

    <section class="hero hero-new">
  <div class="hero-left">
    <h1>Consensus, Not Picks</h1>
    <p>
      Odds are aggregated across sharp and public books, normalized for vig,
      and ranked by expected value and agreement.
    </p>
  </div>

  <div class="hero-right">
    <div class="legend-item">
      <span class="legend-dot strong"></span>
      Strength = edge magnitude
    </div>
    <div class="legend-item">
      <span class="legend-dot conf"></span>
      Shading = book agreement
    </div>
    <div class="legend-item">
      <span class="legend-dot sharp"></span>
      Sharp-weighted markets
    </div>
  </div>
</section>

      <div id="games-container" class="games-container">
        <div class="loading">Loading NFL games…</div>
      </div>
    </main>
  </div>

  <footer class="ep-footer">
    Data from The Odds API • EmpirePicks.com
  </footer>
</body>
</html>
