<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EmpirePicks — NFL Odds & Analytics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">EmpirePicks</div>
    <nav>
      <button id="nav-live" class="nav-btn active">Live Games</button>
      <button id="nav-dashboard" class="nav-btn">Dashboard</button>
    </nav>
  </header>

  <main>
    <section id="live-games" class="page-section">
      <div id="games-container" class="games-grid"></div>
    </section>

    <section id="dashboard" class="page-section hidden">
      <div id="dashboard-container"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
