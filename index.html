<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EmpirePicks • NFL Odds & Props</title>

  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="script.js" defer></script>
</head>

<body>
  <header class="ep-header">
    <div class="logo">🏛️ EmpirePicks</div>
    <button id="refresh-btn">Refresh Odds</button>
  </header>

  <div class="layout">
    <aside class="left-rail">
      <section id="top-picks" class="top-picks"></section>
    </aside>

    <main class="main-content">
      <section class="hero">
        <h1>EmpirePicks</h1>
        <p>Track the sharpest plays and model-driven edge from the top books.</p>
        <div id="profile-bar" class="profile-bar">
          ⚔️ Sharp Level 1 • 🔥 Win Streak: 0 • Picks Analyzed: 0
        </div>
      </section>

      <div id="games-container" class="games-container">
        <div class="loading">Loading NFL games…</div>
      </div>
    </main>
  </div>

  <footer class="ep-footer">
    Data from The Odds API • EmpirePicks.com
  </footer>
</body>
</html>
