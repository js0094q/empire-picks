<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EmpirePicks | NFL Odds & Props</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="teams.js"></script>
</head>
<body>
  <script>
  if (!localStorage.getItem("EP_TOKEN")) {
    window.location.href = "/login.html";
  }
</script>
  <header class="header">
    <h1>🏛 EmpirePicks</h1>
    <p>NFL Odds & Props Aggregator (Week View)</p>
    <button id="refreshBtn">⟳ Refresh Data</button>
  </header>

  <main id="games" class="games"></main>

  <footer class="footer">
    Data from The Odds API | Built for EmpirePicks.com
  </footer>

  <script src="script.js" type="module"></script>
  <script>
  window.__EP_SECRET = document.cookie.split('; ')
    .find(r => r.startsWith('__EP_SECRET'))
    ?.split('=')[1];
</script>
</body>
</html>
