<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EmpirePicks | Beta Login</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0d1228 0%, #161c33 40%, #000 95%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, sans-serif;
      color: var(--text);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      width: 360px;
      background: var(--card);
      padding: 2.2rem 2rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 0 25px rgba(0,0,0,0.45);
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }

    .subtitle {
      color: #cdd3e8;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    input {
      width: 90%;
      padding: 0.75rem;
      margin-top: 0.7rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: #0c1127;
      color: var(--text);
      outline: none;
      font-size: 1rem;
      transition: border 0.15s;
    }

    input:focus {
      border-color: var(--gold);
    }

    button {
      width: 95%;
      margin-top: 1.3rem;
      padding: 0.75rem;
      background: var(--gold);
      border-radius: var(--radius);
      border: none;
      color: #000;
      font-weight: 700;
      cursor: pointer;
      font-size: 1.05rem;
      transition: transform 0.1s ease-out, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 12px rgba(255, 204, 51, 0.4);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    #error {
      margin-top: 1rem;
      color: #ff6b6b;
      min-height: 20px;
      font-size: 0.9rem;
    }

    .footer {
      margin-top: 1.6rem;
      color: #8d95b8;
      font-size: 0.75rem;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <div class="logo">🏛 EmpirePicks</div>
    <div class="subtitle">Private Beta Access</div>

    <input 
      id="invite"
      placeholder="Enter Invite Code"
      autocomplete="off"
    />

    <button id="loginBtn">Login</button>

    <div id="error"></div>

    <div class="footer">
      Secure Beta Environment • EmpirePicks.com
    </div>
  </div>

  <script type="module">
    import { createToken } from "./token.js";

    const input = document.getElementById("invite");
    const error = document.getElementById("error");

    async function login(){
      const code = input.value.trim();

      if(!code){
        error.textContent = "Invite code required.";
        return;
      }

      const token = await createToken(code);

      if(!token){
        error.textContent = "Invalid invite code.";
        return;
      }

      localStorage.setItem("EP_TOKEN", token);
      window.location.href = "/";
    }

    document.getElementById("loginBtn").onclick = login;

    // Allow "Enter" key submission
    input.addEventListener("keyup", e => {
      if(e.key === "Enter") login();
    });
  </script>

</body>
</html>
