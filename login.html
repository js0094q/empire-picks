<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>EmpirePicks – Login</title>

  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>

<body>

  <header class="site-header">
    <div class="brand">
      <div class="brand-mark">EP</div>
      <span class="brand-name">EmpirePicks</span>
    </div>
  </header>

  <main style="max-width:420px; margin:80px auto; padding:20px;">
    <h2 style="margin-bottom:20px;">Log In</h2>

    <div class="card" style="padding:20px; background:var(--bg-card-light);">
      <label>Email</label>
      <input type="email" id="email" style="width:100 percent; padding:10px; margin:10px 0; border-radius:var(--radius-sm);">

      <label>Password</label>
      <input type="password" id="password" style="width:100 percent; padding:10px; margin:10px 0; border-radius:var(--radius-sm);">

      <button class="button primary full-width" id="login-btn" style="margin-top:14px;">
        Log In
      </button>
    </div>
  </main>

  <script src="token.js"></script>
</body>
</html>
