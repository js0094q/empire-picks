<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EmpirePicks Beta Login</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0d1228, #171c36 40%, #000 95%);
      font-family: system-ui;
    }
    .login-box {
      width: 340px;
      background: var(--card);
      padding: 2rem;
      border-radius: var(--radius);
      border: 1px solid var(--gold);
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
      text-align: center;
      color: var(--text);
    }
    input {
      width: 90%;
      padding: 0.7rem;
      margin-top: 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: #10152e;
      color: var(--text);
    }
    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.7rem;
      background: var(--gold);
      border-radius: var(--radius);
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h2 style="color:var(--gold); font-size:1.8rem;">🏛 EmpirePicks</h2>
    <p>Private Beta Access</p>

    <input id="invite" placeholder="Invite Code" />
    <button id="btn">Enter</button>

    <p id="err" style="color:var(--red); height:20px;"></p>
  </div>

  <script type="module">
    import { createToken } from "./token.js";

    document.getElementById("btn").onclick = async () => {
      const code = document.getElementById("invite").value.trim();
      if (!code) {
        err.textContent = "Enter a valid code";
        return;
      }

      const token = await createToken(code);
      if (!token){
        err.textContent = "Invalid code";
        return;
      }

      localStorage.setItem("EP_TOKEN", token);
      window.location.href = "/";
    };
  </script>
</body>
</html>
