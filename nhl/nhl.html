<!DOCTYPE html>
<html lang="en">

  <title>EmpirePicks · NHL Odds</title>

  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="script.js" defer></script>
</head>

<body data-sport="nhl">
  <header class="ep-header">
    <div class="brand">
      <div class="logo">🏛️ EmpirePicks</div>

        <a href="/">NFL</a>
        <a href="/nhl" class="active">NHL</a>
